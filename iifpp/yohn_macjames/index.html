<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IIFPP WIKI | PSS</title>
    <style>
        :root {
            --accent: #b366ff;
            --bg: #202020;
            --panel: #252525;
            --border: #444;
            --text: #d1d1d1;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: "Calibri", "Candara", "Segoe UI", sans-serif;
        }

        .wiki-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 320px; 
            gap: 40px;
            align-items: start;
        }

        /* --- HOVER SPOILER SYSTEM --- */
        .spoiler {
            background-color: #000;
            color: #000;
            padding: 0 2px;
            border-radius: 2px;
            transition: background-color 0.1s, color 0.1s;
        }

        .spoiler:hover {
            background-color: rgba(179, 102, 255, 0.2);
            color: var(--text);
        }

        /* --- IMAGE SLIDER (Legacy Style) --- */
        .slider-container {
            width: 100%;
            height: 200px; /* Adjust based on your image height */
            overflow: hidden;
            position: relative;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
        }

        .slider-wrapper {
            display: flex;
            width: 200%; /* Two images wide */
            height: 100%;
            animation: slideImages 10s infinite; /* 5 seconds per image */
        }

        .slider-wrapper img {
            width: 50%; /* Each image takes up half of the wrapper */
            height: 100%;
            object-fit: cover;
        }

        @keyframes slideImages {
            0%, 45% { transform: translateX(0); } /* Stay on first image */
            50%, 95% { transform: translateX(-50%); } /* Slide to second image */
            100% { transform: translateX(0); } /* Snap back to start */
        }

        /* --- INFOBOX DESIGN --- */
        .wiki-infobox {
            background: var(--panel);
            border: 1px solid var(--border);
            font-size: 13px;
            position: sticky;
            top: 20px;
        }

        .infobox-header {
            background-color: var(--accent);
            color: #000;
            text-align: center;
            padding: 8px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .infobox-sub-label {
            background: #444;
            color: #fff;
            text-align: center;
            padding: 5px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .infobox-table {
            width: 100%;
            border-collapse: collapse;
        }

        .infobox-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #333;
        }

        .label-cell { color: #888; width: 40%; font-weight: bold; }

        /* --- CONTENT WRAPPING --- */
        .wiki-title {
            font-size: 32px;
            color: var(--accent);
            margin-bottom: 20px;
            font-weight: bold;
        }

        .article-text {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        @media (max-width: 850px) {
            .wiki-container { grid-template-columns: 1fr; }
            .wiki-infobox { position: static; order: -1; }
        }
    </style>
</head>
<body>

    <div class="wiki-container">
        
        <div class="wiki-content">
            <div class="wiki-title">Yohn Macjames</div>
            
            <div class="article-text">
                <div class="article-text">
                    <p>Was the IIFPP's Past Site Director Back beffore 2005 and died on June <span class="spoiler">//</span> of 2025 later he was replaced by current site director <a href="https://forum.plasmastarstudios.com/iifpp/ffyffhhalop/">ffyffhhalop</a> witch bought the compound in advance from Yohn Macjames</p>
                </div>
            </div>
        </div>

        <aside class="wiki-infobox">
            <div class="infobox-header">Yohn Macjames</div>
            
            <div class="slider-container">
                <div class="slider-wrapper" style="animation: none;">
                    <img src="https://github.com/PlasmaStarStudios/pssforum/blob/main/iifpp/yohn_macjames/redacted.png?raw=true" alt="Display 1">
                </div>
            </div>
            
            <div class="infobox-sub-label">IDENTITY</div>
            <!-- test -->
            <table class="infobox-table">
                <tr><td class="label-cell">Name</td><td>Yohn Macjames</td></tr>
                <tr><td class="label-cell">Species</td><td>Human</td></tr>
                <tr><td class="label-cell">Sex</td><td>Male</td></tr>
                <tr><td class="label-cell">Age</td><td><span class="spoiler">//</span></td></tr>
            </table>
        </aside>

    </div>

    <script src="../topbar.js"></script>
</body>
</html>
